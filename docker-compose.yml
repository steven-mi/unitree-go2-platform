services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
      - ./unitree_webrtc_connect:/unitree_webrtc_connect
      - ./recordings:/app/recordings
      - ./scans:/app/scans
      - ./config.yml:/config.yml
      - backend_venv:/app/.venv
    environment:
      RECORDINGS_DIR: /app/recordings
      SCANS_DIR: /app/scans
      ROBOT_IP: ${ROBOT_IP:-}
    network_mode: host
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8080 --reload --timeout-graceful-shutdown 5
    # After pulling backend changes: docker compose exec backend uv sync

  frontend:
    build: ./frontend
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VITE_API_TARGET: http://host.docker.internal:8080
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  backend_venv:
